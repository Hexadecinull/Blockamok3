name: CI – PSP

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_psp'
      - '.github/workflows/ci_psp.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build PSP (pspdev)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install pspdev toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends curl git cmake python3
          curl -L \
            https://github.com/pspdev/pspdev/releases/latest/download/pspdev-ubuntu-latest-x86_64.tar.gz \
            | sudo tar -xz -C /usr/local

      - name: Add pspdev to PATH and set PKG_CONFIG_PATH
        run: |
          echo "/usr/local/pspdev/bin" >> $GITHUB_PATH
          echo "PKG_CONFIG_PATH=/usr/local/pspdev/psp/lib/pkgconfig" >> $GITHUB_ENV
          echo "PSPDEV=/usr/local/pspdev" >> $GITHUB_ENV

      - name: Verify toolchain
        run: psp-gcc --version

      - name: Install PSP SDL2 via psp-pacman
        # pspdev now ships psp-pacman; try it first, fall back gracefully
        run: |
          if command -v psp-pacman &>/dev/null; then
            psp-pacman -Sy --noconfirm psp-sdl2 psp-sdl2_mixer psp-sdl2_ttf 2>/dev/null || true
          fi
          # Verify SDL.h is present; if not, build SDL2 from pspdev ports
          if [ ! -f "/usr/local/pspdev/psp/include/SDL2/SDL.h" ]; then
            echo "SDL2 not found via pacman, building from source..."
            cd /tmp
            git clone --depth=1 https://github.com/pspdev/psp-packages.git
            cd psp-packages
            for pkg in SDL2 SDL2_mixer SDL2_ttf; do
              if [ -d "$pkg" ]; then
                cd "$pkg" && PSPDEV=/usr/local/pspdev make install || true && cd ..
              fi
            done
          fi

      - name: Build
        run: |
          export PKG_CONFIG_PATH=/usr/local/pspdev/psp/lib/pkgconfig
          export PSPDEV=/usr/local/pspdev
          make -f Makefiles/Makefile_psp -j$(nproc)

      - name: Verify EBOOT.PBP
        run: test -f EBOOT.PBP || ls -lh *.elf 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-psp
          path: EBOOT.PBP
          retention-days: 14
          if-no-files-found: warn
