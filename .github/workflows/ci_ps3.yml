name: CI – PS3 (PSL1GHT)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_ps3'
      - '.github/workflows/ci_ps3.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# Uses the official ps3dev/ps3dev Docker image which ships ppu-gcc and PSL1GHT
# pre-installed, eliminating the 35-45 min from-source toolchain build.
jobs:
  build:
    name: Build PS3 (PSL1GHT)
    runs-on: ubuntu-24.04
    container:
      image: ps3dev/buildenv:latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Verify toolchain
        run: |
          ppu-gcc --version && echo "✅ ppu-gcc found" || echo "::warning::ppu-gcc not on PATH"
          which ppu-gcc 2>/dev/null || find /usr /opt -name "ppu-gcc" 2>/dev/null | head -3
          echo "PS3DEV=${PS3DEV:-not set}"
          echo "PSL1GHT=${PSL1GHT:-not set}"
          ls /usr/local/ps3dev/bin/ 2>/dev/null | head -5 || true
          ls /usr/ps3dev/bin/ 2>/dev/null | head -5 || true

      - name: Install host build tools
        run: |
          apt-get update -qq 2>/dev/null || true
          apt-get install -y --no-install-recommends make 2>/dev/null || true

      - name: Build Blockamok for PS3
        run: make -f Makefiles/Makefile_ps3 -j$(nproc)

      - name: Verify output
        run: ls -lh *.self *.elf 2>/dev/null || echo "No output produced"

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-ps3
          path: |
            *.self
            *.elf
          retention-days: 14
          if-no-files-found: warn
