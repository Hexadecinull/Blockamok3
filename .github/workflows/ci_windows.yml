name: CI – Windows

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_pc'
      - 'Makefiles/Makefile_pc_x86'
      - 'release-resources/resource.rc'
      - 'release-resources/resource.h'
      - 'ci/Directory.Build.props'
      - '.github/workflows/ci_windows.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build-msys2-x64:
    name: Build Windows x64 (MSYS2)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-pkgconf
            make
      - name: Build
        run: make -f Makefiles/Makefile_pc -j$(nproc)
      - name: Verify EXE
        run: test -f BlockamokRemix.exe
      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-windows-x64
          path: BlockamokRemix.exe
          retention-days: 14

  build-msys2-x64-lowend:
    name: Build Windows x64 Low-End (MSYS2)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-pkgconf
            make
      - name: Build (low-end)
        run: make -f Makefiles/Makefile_pc LOW_END=1 -j$(nproc)
      - name: Verify EXE
        run: test -f BlockamokRemix.exe
      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-windows-x64-lowend
          path: BlockamokRemix.exe
          retention-days: 14

  build-msys2-x86:
    name: Build Windows x86 (MSYS2)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          update: true
          install: >-
            mingw-w64-i686-gcc
            mingw-w64-i686-SDL2
            mingw-w64-i686-SDL2_mixer
            mingw-w64-i686-SDL2_ttf
            mingw-w64-i686-pkgconf
            make
      - name: Build x86
        run: make -f Makefiles/Makefile_pc_x86 -j$(nproc)
      - name: Verify EXE
        run: test -f BlockamokRemix.exe
      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-windows-x86
          path: BlockamokRemix.exe
          retention-days: 14

  build-visualstudio:
    name: Build Windows (Visual Studio 2022)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache SDL2 VC libraries
        id: cache-sdl2
        uses: actions/cache@v4
        with:
          path: SDL2
          key: sdl2-vc-2.30.10-v4

      - name: Download and extract SDL2 VC libraries
        if: steps.cache-sdl2.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          function Get-SDL($url, $zipName, $destDir) {
            Write-Host "Downloading $url"
            Invoke-WebRequest $url -OutFile $zipName
            $tmp = "tmp_$(Get-Random)"
            Expand-Archive $zipName -DestinationPath $tmp -Force
            # Each zip has exactly one top-level folder; get it
            $inner = (Get-ChildItem $tmp -Directory | Select-Object -First 1).FullName
            New-Item -ItemType Directory -Force $destDir | Out-Null
            # Move every item from the inner folder into destDir
            Get-ChildItem $inner | ForEach-Object { Move-Item $_.FullName $destDir -Force }
            Remove-Item $tmp  -Recurse -Force
            Remove-Item $zipName -Force
          }

          New-Item -ItemType Directory -Force SDL2 | Out-Null
          Get-SDL "https://github.com/libsdl-org/SDL/releases/download/release-2.30.10/SDL2-devel-2.30.10-VC.zip"            "s.zip" "SDL2\SDL2"
          Get-SDL "https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.0/SDL2_mixer-devel-2.8.0-VC.zip"   "m.zip" "SDL2\SDL2_mixer"
          Get-SDL "https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-devel-2.22.0-VC.zip"     "t.zip" "SDL2\SDL2_ttf"

          Write-Host "SDL2 layout:"
          Get-ChildItem SDL2 -Recurse -Depth 2 | Select-Object FullName

      - name: Deploy Directory.Build.props
        # Copies the CI props file that injects SDL2 paths into every MSBuild project.
        # MSBuild auto-discovers Directory.Build.props in the project root.
        shell: pwsh
        run: Copy-Item ci\Directory.Build.props . -Force

      - name: Set SDL2Root env var
        shell: pwsh
        run: |
          $r = "$($pwd.Path)\SDL2\"
          echo "SDL2Root=$r" >> $env:GITHUB_ENV
          Write-Host "SDL2Root=$r"

      - name: Build with MSBuild
        shell: pwsh
        run: |
          & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\MSBuild\Current\Bin\MSBuild.exe" `
            blockamok.sln `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /m

      - name: Copy SDL2 DLLs next to EXE
        shell: pwsh
        run: |
          $out = "x64\Release"
          Copy-Item "SDL2\SDL2\lib\x64\SDL2.dll"             $out -Force
          Copy-Item "SDL2\SDL2_mixer\lib\x64\SDL2_mixer.dll" $out -Force
          Copy-Item "SDL2\SDL2_ttf\lib\x64\SDL2_ttf.dll"     $out -Force

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-windows-vs2022-x64
          path: |
            x64/Release/BlockamokRemix.exe
            x64/Release/*.dll
          retention-days: 14
