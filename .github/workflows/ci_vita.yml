name: CI – PS Vita

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/make_vita.sh'
      - 'release-resources/template_vita.xml'
      - '.github/workflows/ci_vita.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build PS Vita (vitasdk)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake git curl python3 ninja-build zip

      - name: Cache vitasdk
        id: cache-vitasdk
        uses: actions/cache@v4
        with:
          path: /usr/local/vitasdk
          key: vitasdk-2024-v4

      - name: Install vitasdk
        # Only run bootstrap if the cache did NOT restore vitasdk
        if: steps.cache-vitasdk.outputs.cache-hit != 'true'
        run: |
          export VITASDK=/usr/local/vitasdk
          sudo mkdir -p $VITASDK && sudo chown $USER:$USER $VITASDK
          git clone --depth=1 https://github.com/vitasdk/vdpm /tmp/vdpm
          cd /tmp/vdpm && VITASDK=$VITASDK ./bootstrap-vitasdk.sh

      - name: Add vitasdk to PATH
        run: |
          echo "/usr/local/vitasdk/bin" >> $GITHUB_PATH
          echo "VITASDK=/usr/local/vitasdk" >> $GITHUB_ENV

      - name: Clone vdpm (always needed for package installs)
        run: |
          git clone --depth=1 https://github.com/vitasdk/vdpm /tmp/vdpm 2>/dev/null || true

      - name: Cache SDL2 Vita packages
        id: cache-vita-sdl
        uses: actions/cache@v4
        with:
          path: /tmp/vita-sdl-installed
          key: vita-sdl2-2.28-mixer-2.6-ttf-2.22-v2

      - name: Install SDL2 / mixer / ttf for Vita
        if: steps.cache-vita-sdl.outputs.cache-hit != 'true'
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          cd /tmp/vdpm
          ./vdpm SDL2
          ./vdpm SDL2_mixer
          ./vdpm SDL2_ttf
          touch /tmp/vita-sdl-installed

      - name: Build VPK
        run: |
          export VITASDK=/usr/local/vitasdk
          export PATH=$VITASDK/bin:$PATH
          bash Makefiles/make_vita.sh

      - name: Verify VPK
        run: ls -lh *.vpk 2>/dev/null || ls -lh *.velf *.self 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-vita
          path: '*.vpk'
          retention-days: 14
          if-no-files-found: warn
