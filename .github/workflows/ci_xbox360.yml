name: CI – Xbox 360 (libxenon)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_xbox360'
      - '.github/workflows/ci_xbox360.yml'
  pull_request:
    branches: [main, master, develop]

# NOTE: libxenon does not have a pre-built Docker image published to GHCR.
# This workflow builds the toolchain from source and caches it aggressively.
# Total cold-build time: ~25 min (toolchain) + ~2 min (game). Warm: ~2 min.

jobs:
  build:
    name: Build Xbox 360 (libxenon)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ make cmake git curl wget \
            bison flex texinfo libgmp-dev libmpfr-dev libmpc-dev \
            libncurses-dev python3 python3-pip zlib1g-dev

      - name: Cache libxenon toolchain
        id: cache-xenon
        uses: actions/cache@v4
        with:
          path: /usr/local/xenon
          key: libxenon-toolchain-v2

      - name: Build libxenon toolchain
        if: steps.cache-xenon.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://github.com/Free60Project/libxenon.git /tmp/libxenon
          cd /tmp/libxenon
          # Build the PowerPC 64-bit xenon cross-compiler
          PREFIX=/usr/local/xenon
          sudo mkdir -p $PREFIX
          sudo chown $USER:$USER $PREFIX
          cd toolchain && make PREFIX=$PREFIX -j$(nproc) 2>&1 | tail -50
          cd ../libxenon && make PREFIX=$PREFIX install -j$(nproc)
        timeout-minutes: 45

      - name: Add toolchain to PATH
        run: echo "/usr/local/xenon/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: powerpc64-xenon-elf-gcc --version

      - name: Build Blockamok for Xbox 360
        run: |
          XENON_DIR=/usr/local/xenon make -f Makefiles/Makefile_xbox360 -j$(nproc)

      - name: Verify output exists
        run: ls -lh *.xex *.elf32 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-xbox360
          path: |
            *.xex
            *.elf32
          retention-days: 14
