name: CI – Xbox (Original, nxdk)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_xbox'
      - '.github/workflows/ci_xbox_original.yml'
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    name: Build Original Xbox (nxdk)
    runs-on: ubuntu-24.04
    # Use the official nxdk container — it ships a pre-built LLVM/Clang
    # toolchain (nxdk-cc) required to build for the original Xbox.
    container:
      image: ghcr.io/xboxdev/nxdk:latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify nxdk toolchain
        run: nxdk-cc --version || clang --version

      - name: Build Blockamok for OG Xbox
        run: |
          NXDK_DIR=/nxdk make -f Makefiles/Makefile_xbox -j$(nproc)

      - name: Verify XBE / ISO
        run: ls -lh *.xbe *.iso BlockamokRemix.* 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-xbox-original
          path: |
            *.xbe
            *.iso
          retention-days: 14
          if-no-files-found: warn
