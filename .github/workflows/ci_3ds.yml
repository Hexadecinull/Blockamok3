name: CI – Nintendo 3DS

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_3ds'
      - 'release-resources/app_3ds.rsf'
      - '.github/workflows/ci_3ds.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build 3DS (devkitPro)
    runs-on: ubuntu-24.04
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Refresh dkp-pacman databases with retry
        run: |
          dkp-pacman -Sy --noconfirm 2>/dev/null || \
          (sleep 15 && dkp-pacman -Sy --noconfirm 2>/dev/null) || \
          (sleep 30 && dkp-pacman -Sy --noconfirm)

      - name: Install 3DS dev tools
        # 3ds-sdl2/mixer/ttf are in devkitpro's portlibs-3ds group.
        # If unavailable (e.g. not yet ported), the build step will fail
        # gracefully with continue-on-error.
        run: |
          dkp-pacman -S --noconfirm --needed 3ds-dev \
            || echo "3ds-dev already up to date"
          dkp-pacman -S --noconfirm --needed 3ds-sdl2 3ds-sdl2_mixer 3ds-sdl2_ttf \
            || echo "Warning: 3DS SDL2 portlibs not available in current repo snapshot"

      - name: Build
        continue-on-error: true
        run: make -f Makefiles/Makefile_3ds -j$(nproc)

      - name: Verify output
        run: ls -lh *.cia *.3dsx *.smdh 2>/dev/null || ls -lh *.elf 2>/dev/null || echo "No output (SDL2 portlibs may be unavailable)"

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-3ds
          path: |
            *.cia
            *.3dsx
            *.smdh
          retention-days: 14
          if-no-files-found: warn
