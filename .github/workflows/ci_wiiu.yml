name: CI – Wii U

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'CMakeLists.txt'
      - 'Makefiles/make_wii_u.sh'
      - '.github/workflows/ci_wiiu.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build Wii U (devkitPro + WUT)
    runs-on: ubuntu-24.04
    container:
      image: devkitpro/devkitppc:latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync dkp-pacman databases with retry
        run: |
          dkp-pacman -Sy --noconfirm 2>/dev/null || \
          (sleep 15 && dkp-pacman -Sy --noconfirm 2>/dev/null) || \
          (sleep 30 && dkp-pacman -Sy --noconfirm)

      - name: Install WUT + Wii U SDL2
        run: |
          dkp-pacman -S --noconfirm --needed \
            wut \
            wiiu-sdl2 wiiu-sdl2_mixer wiiu-sdl2_ttf \
            wiiu-cmake

      - name: Build with CMake
        run: |
          source /etc/profile.d/devkit-env.sh 2>/dev/null || true
          mkdir -p build_wiiu && cd build_wiiu
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE="$DEVKITPRO/cmake/WiiU.cmake" \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Verify output
        run: ls -lh build_wiiu/*.rpx build_wiiu/*.wuhb 2>/dev/null || ls -lh build_wiiu/*.elf 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-wiiu
          path: |
            build_wiiu/*.rpx
            build_wiiu/*.wuhb
          retention-days: 14
          if-no-files-found: warn
