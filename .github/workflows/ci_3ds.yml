name: CI – Nintendo 3DS

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_3ds'
      - 'release-resources/app_3ds.rsf'
      - '.github/workflows/ci_3ds.yml'
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    name: Build 3DS (devkitPro)
    runs-on: ubuntu-24.04
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Refresh dkp-pacman databases with retry
        # pkg.devkitpro.org occasionally returns 403 on first sync;
        # retry once with a short back-off.
        run: |
          dkp-pacman -Sy --noconfirm 2>/dev/null || \
          (sleep 10 && dkp-pacman -Sy --noconfirm)

      - name: Install 3DS portlibs
        run: |
          dkp-pacman -S --noconfirm --needed \
            3ds-dev 3ds-sdl2 3ds-sdl2_mixer 3ds-sdl2_ttf

      - name: Build
        run: make -f Makefiles/Makefile_3ds -j$(nproc)

      - name: Verify output
        run: ls -lh *.cia *.3dsx *.smdh 2>/dev/null || ls -lh *.elf 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-3ds
          path: |
            *.cia
            *.3dsx
            *.smdh
          retention-days: 14
          if-no-files-found: warn
