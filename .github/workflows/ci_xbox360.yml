name: CI – Xbox 360 (libxenon)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_xbox360'
      - '.github/workflows/ci_xbox360.yml'
  pull_request:
    branches: [main, master, develop]

# libxenon has no pre-built Docker image; we build the toolchain from source
# and cache it. Cold build ~25–35 min; subsequent runs use the cache (~2 min).
# The job uses continue-on-error so toolchain availability doesn't break CI.

jobs:
  build:
    name: Build Xbox 360 (libxenon)
    runs-on: ubuntu-24.04
    continue-on-error: true   # toolchain build can be flaky on CI infra

    steps:
      - uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ make cmake git curl wget \
            bison flex texinfo libgmp-dev libmpfr-dev libmpc-dev \
            libncurses-dev python3 zlib1g-dev

      - name: Cache libxenon toolchain
        id: cache-xenon
        uses: actions/cache@v4
        with:
          path: /usr/local/xenon
          key: libxenon-toolchain-v3

      - name: Build libxenon toolchain
        if: steps.cache-xenon.outputs.cache-hit != 'true'
        timeout-minutes: 45
        run: |
          PREFIX=/usr/local/xenon
          sudo mkdir -p $PREFIX && sudo chown $USER:$USER $PREFIX

          git clone --depth=1 https://github.com/Free60Project/libxenon.git /tmp/libxenon
          cd /tmp/libxenon

          # The repo root Makefile builds the full toolchain + libs
          # CROSS_INSTALL_PREFIX controls where binaries go
          CROSS_INSTALL_PREFIX=$PREFIX make -j$(nproc) toolchain 2>&1 | tail -100
          CROSS_INSTALL_PREFIX=$PREFIX make -j$(nproc) install  2>&1 | tail -50

      - name: Add toolchain to PATH
        run: echo "/usr/local/xenon/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: powerpc64-xenon-elf-gcc --version || echo "Toolchain not built – skipping game build"

      - name: Build Blockamok for Xbox 360
        run: |
          if command -v powerpc64-xenon-elf-gcc &>/dev/null; then
            XENON_DIR=/usr/local/xenon make -f Makefiles/Makefile_xbox360 -j$(nproc)
          else
            echo "Toolchain unavailable; skipping" && exit 0
          fi

      - name: Verify output
        run: ls -lh *.xex *.elf32 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-xbox360
          path: |
            *.xex
            *.elf32
          retention-days: 14
          if-no-files-found: warn
