name: CI – Compile-time Sanity Checks

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'ci/stubs/**'
      - '.github/workflows/ci_compile_check.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  syntax-check:
    name: Syntax check (${{ matrix.target }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: PC_LINUX
            defines: -DPC -DLINUX
          - target: ANDROID
            defines: -DANDROID -DNO_QUIT -DFORCE_DRAW_BG -DFORCE_DRAW_OVERLAY
          - target: EMSCRIPTEN
            defines: -DPC -D__EMSCRIPTEN__
          - target: SWITCH
            defines: -DSWITCH
          - target: WII_U
            defines: -DWII_U
          - target: WII
            defines: -DWII
          - target: GAMECUBE
            defines: -DGAMECUBE
          - target: XBOX
            defines: -DXBOX -DLOW_SPEC_BG -DFORCE_DRAW_OVERLAY -DNO_QUIT
          - target: XBOX360
            defines: -DXBOX360
          - target: PS3
            defines: -DPS3
          - target: VITA
            defines: -DVITA
          - target: PSP
            defines: -DPSP
          - target: THREEDS
            defines: -DTHREEDS
          - target: RG35XX
            defines: -DPC -DLINUX -DRG35XX

    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 dev headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc libsdl2-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Check all src/*.c files parse cleanly
        run: |
          DEFINES="${{ matrix.defines }}"
          FAILED=0
          STUB_DIR="ci/stubs"
          # SDL2 cflags from host; stubs fill in platform-specific headers
          SDL_INC=$(sdl2-config --cflags | sed 's/-D[^ ]*//g')

          for f in src/*.c src/audio/*.c src/fonts/*.c; do
            echo -n "  Checking $f ... "
            if gcc -fsyntax-only -w \
                $DEFINES \
                -I"$STUB_DIR" \
                $SDL_INC \
                -Isrc \
                "$f" 2>/tmp/gcc_out; then
              echo "ok"
            else
              echo "FAILED"
              cat /tmp/gcc_out
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "One or more files failed syntax check for: ${{ matrix.target }}"
            exit 1
          fi
          echo "All files passed for ${{ matrix.target }}"
