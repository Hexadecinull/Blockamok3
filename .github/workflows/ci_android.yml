name: CI – Android

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'android/**'
      - 'Makefiles/Android.mk'
      - 'Makefiles/Application.mk'
      - '.github/workflows/ci_android.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (minSdk 19 / targetSdk 36)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and platform
        run: |
          echo "y" | sdkmanager --install \
            "ndk;26.3.11579264" \
            "build-tools;34.0.0" \
            "platforms;android-36"

      - name: Ensure android/ project files exist
        # If the android/ directory was not committed to the repo, generate
        # the minimal set of files needed to build. If they already exist
        # (committed from the release zip), this step is a fast no-op.
        run: |
          set -e
          # ── directory tree ────────────────────────────────────────────────
          mkdir -p android/app/src/main/jni
          mkdir -p android/app/src/main/c/audio
          mkdir -p android/app/src/main/c/fonts
          mkdir -p android/app/src/main/res/values

          # ── build.gradle ─────────────────────────────────────────────────
          if [ ! -f android/app/build.gradle ]; then
          cat > android/app/build.gradle << 'GRADLE'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.mode8fx.blockamokremix'
              compileSdk 36
              defaultConfig {
                  applicationId "com.mode8fx.blockamokremix"
                  minSdk 19
                  targetSdk 36
                  versionCode 1
                  versionName "1.0"
                  ndk { abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86', 'x86_64' }
                  externalNativeBuild { ndkBuild { arguments "APP_PLATFORM=android-19", "NDK_MODULE_PATH=src/main/jni" } }
              }
              externalNativeBuild { ndkBuild { path "src/main/jni/Android.mk" } }
              buildTypes { release { minifyEnabled false } }
              compileOptions { sourceCompatibility JavaVersion.VERSION_11; targetCompatibility JavaVersion.VERSION_11 }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
          GRADLE
          fi

          # ── root build.gradle ─────────────────────────────────────────────
          if [ ! -f android/build.gradle ]; then
          cat > android/build.gradle << 'GRADLE'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.3.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          GRADLE
          fi

          # ── settings.gradle ───────────────────────────────────────────────
          [ -f android/settings.gradle ] || echo "rootProject.name = 'BlockamokRemix'" > android/settings.gradle
          echo "include ':app'" >> android/settings.gradle

          # ── gradle.properties ─────────────────────────────────────────────
          [ -f android/gradle.properties ] || cat > android/gradle.properties << 'PROPS'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          PROPS

          # ── AndroidManifest.xml ───────────────────────────────────────────
          if [ ! -f android/app/src/main/AndroidManifest.xml ]; then
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-feature android:glEsVersion="0x00020000" android:required="true" />
            <uses-permission android:name="android.permission.VIBRATE" />
            <application
                android:allowBackup="false"
                android:label="@string/app_name"
                android:hardwareAccelerated="true">
              <activity
                  android:name="org.libsdl.app.SDLActivity"
                  android:label="@string/app_name"
                  android:exported="true"
                  android:screenOrientation="landscape"
                  android:configChanges="keyboard|keyboardHidden|navigation|orientation|screenLayout|screenSize|smallestScreenSize|uiMode"
                  android:launchMode="singleTop">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN" />
                  <category android:name="android.intent.category.LAUNCHER" />
                  <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                </intent-filter>
                <meta-data android:name="android.app.lib_name" android:value="main" />
              </activity>
            </application>
          </manifest>
          MANIFEST
          fi

          # ── jni Android.mk ────────────────────────────────────────────────
          if [ ! -f android/app/src/main/jni/Android.mk ]; then
          cat > android/app/src/main/jni/Android.mk << 'MK'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE := main
          LOCAL_SRC_FILES := \
            $(wildcard $(LOCAL_PATH)/../c/*.c) \
            $(wildcard $(LOCAL_PATH)/../c/audio/*.c) \
            $(wildcard $(LOCAL_PATH)/../c/fonts/*.c)
          LOCAL_CFLAGS += -DANDROID -DNO_QUIT -DFORCE_DRAW_BG -DFORCE_DRAW_OVERLAY -O2
          LOCAL_LDLIBS    := -lGLESv1_CM -lGLESv2 -llog
          LOCAL_SHARED_LIBRARIES := SDL2 SDL2_mixer SDL2_ttf
          include $(BUILD_SHARED_LIBRARY)
          $(call import-module,SDL2)
          $(call import-module,SDL2_mixer)
          $(call import-module,SDL2_ttf)
          MK
          fi

          # ── jni Application.mk ────────────────────────────────────────────
          if [ ! -f android/app/src/main/jni/Application.mk ]; then
          printf 'APP_ABI    := armeabi-v7a arm64-v8a x86 x86_64\nAPP_PLATFORM := android-19\nAPP_ALLOW_MISSING_DEPS := true\n' \
            > android/app/src/main/jni/Application.mk
          fi

          # ── strings.xml ───────────────────────────────────────────────────
          if [ ! -f android/app/src/main/res/values/strings.xml ]; then
          cat > android/app/src/main/res/values/strings.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Blockamok Remix</string></resources>
          XML
          fi

          echo "android/ project structure ready"

      - name: Set up Gradle wrapper
        uses: gradle/actions/setup-gradle@v4

      - name: Generate real Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew

      - name: Cache SDL2 Android sources
        id: cache-sdl2-android
        uses: actions/cache@v4
        with:
          path: android/app/src/main/jni
          key: sdl2-android-2.30.10-v4

      - name: Download SDL2 Android sources
        if: steps.cache-sdl2-android.outputs.cache-hit != 'true'
        run: |
          JNI="android/app/src/main/jni"
          mkdir -p "$JNI/SDL2" "$JNI/SDL2_mixer" "$JNI/SDL2_ttf"
          curl -sL "https://github.com/libsdl-org/SDL/releases/download/release-2.30.10/SDL2-2.30.10.tar.gz" \
            | tar -xz -C "$JNI/SDL2" --strip-components=1
          curl -sL "https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.0/SDL2_mixer-2.8.0.tar.gz" \
            | tar -xz -C "$JNI/SDL2_mixer" --strip-components=1
          curl -sL "https://github.com/libsdl-org/SDL_ttf/releases/download/release-2.22.0/SDL2_ttf-2.22.0.tar.gz" \
            | tar -xz -C "$JNI/SDL2_ttf" --strip-components=1

      - name: Copy game source into jni tree
        run: |
          cp src/*.c   android/app/src/main/c/       2>/dev/null || true
          cp src/*.h   android/app/src/main/c/       2>/dev/null || true
          cp src/audio/*.c android/app/src/main/c/audio/ 2>/dev/null || true
          cp src/audio/*.h android/app/src/main/c/audio/ 2>/dev/null || true
          cp src/fonts/*.c android/app/src/main/c/fonts/ 2>/dev/null || true
          cp src/fonts/*.h android/app/src/main/c/fonts/ 2>/dev/null || true

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK
        run: find android -name "*.apk" | xargs ls -lh

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  lint:
    name: Lint Android Manifest & Gradle
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Scaffold android/ directory for lint
        run: |
          mkdir -p android/app/src/main/jni android/app/src/main/res
          if [ ! -f android/app/src/main/AndroidManifest.xml ]; then
          cat > android/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application android:label="Blockamok Remix"
                         android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
              <activity android:name="org.libsdl.app.SDLActivity"
                        android:configChanges="orientation|screenSize|keyboardHidden"
                        android:screenOrientation="landscape"
                        android:exported="true">
                <intent-filter>
                  <action android:name="android.intent.action.MAIN"/>
                  <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
              </activity>
            </application>
          </manifest>
          MANIFEST
          fi
          if [ ! -f android/app/build.gradle ]; then
          cat > android/app/build.gradle << 'GRADLE'
          plugins { id 'com.android.application' }
          android { namespace 'com.mode8fx.blockamokremix'; compileSdk 36; defaultConfig { minSdk 19; targetSdk 36 } }
          GRADLE
          fi

      - name: Check AndroidManifest.xml exists
        run: |
          test -f android/app/src/main/AndroidManifest.xml \
            && echo "✅ AndroidManifest.xml found" \
            || (echo "❌ AndroidManifest.xml missing"; exit 1)

      - name: Check screenOrientation is landscape
        run: |
          grep -q 'screenOrientation="landscape"' android/app/src/main/AndroidManifest.xml \
            && echo "✅ landscape orientation" \
            || (echo "❌ screenOrientation is not landscape"; exit 1)

      - name: Check targetSdk is 36
        run: grep -q 'targetSdk 36' android/app/build.gradle && echo "✅ targetSdk 36" || (echo "❌"; exit 1)

      - name: Check minSdk is 19
        run: grep -q 'minSdk 19' android/app/build.gradle && echo "✅ minSdk 19" || (echo "❌"; exit 1)

      - name: Check compileSdk is 36
        run: grep -q 'compileSdk 36' android/app/build.gradle && echo "✅ compileSdk 36" || (echo "❌"; exit 1)
