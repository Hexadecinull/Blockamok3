name: CI – Nintendo 3DS

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_3ds'
      - 'release-resources/app_3ds.rsf'
      - '.github/workflows/ci_3ds.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build 3DS (devkitPro)
    runs-on: ubuntu-24.04
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync dkp-pacman databases with retry
        run: |
          dkp-pacman -Sy --noconfirm 2>/dev/null || \
          (sleep 15 && dkp-pacman -Sy --noconfirm 2>/dev/null) || \
          (sleep 30 && dkp-pacman -Sy --noconfirm)

      - name: Install 3DS dev tools
        run: |
          dkp-pacman -S --noconfirm --needed 3ds-dev 3ds-portlibs || true
          # SDL2 portlibs live in the dkp-3ds-portlibs package group
          dkp-pacman -S --noconfirm --needed             3ds-sdl2 3ds-sdl2_mixer 3ds-sdl2_ttf             3ds-libogg 3ds-libvorbis 3ds-mikmod ||             echo "Warning: 3DS SDL2 portlibs unavailable in current repo snapshot"

      - name: Symlink Makefile for devkitPro recursive build
        # Makefile_3ds calls: $(MAKE) -C $(BUILD) -f $(CURDIR)/Makefile
        # $(CURDIR) is the project root, so it needs a file called exactly "Makefile".
        run: ln -sf Makefiles/Makefile_3ds Makefile

      - name: Set PKG_CONFIG_PATH for devkitPro
        run: |
          # devkitPro installs portlib pkg-config files here
          echo "PKG_CONFIG_PATH=$DEVKITPRO/portlibs/3ds/lib/pkgconfig:$DEVKITPRO/portlibs/armv6k/lib/pkgconfig" >> $GITHUB_ENV
          echo "SDL2_CONFIG=$DEVKITPRO/portlibs/3ds/bin/sdl2-config" >> $GITHUB_ENV

      - name: Build
        continue-on-error: true
        run: |
          export PKG_CONFIG_PATH="$DEVKITPRO/portlibs/3ds/lib/pkgconfig:$DEVKITPRO/portlibs/armv6k/lib/pkgconfig"
          make -j$(nproc)

      - name: Verify output
        run: ls -lh *.cia *.3dsx *.smdh 2>/dev/null || ls -lh *.elf 2>/dev/null || echo "No output (SDL2 portlibs may be unavailable)"

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-3ds
          path: |
            *.cia
            *.3dsx
            *.smdh
          retention-days: 14
          if-no-files-found: warn
