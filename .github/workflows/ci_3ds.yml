name: CI – Nintendo 3DS

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_3ds'
      - 'release-resources/app_3ds.rsf'
      - '.github/workflows/ci_3ds.yml'
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    name: Build 3DS (devkitPro)
    runs-on: ubuntu-24.04
    container:
      image: devkitpro/devkitarm:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install 3DS portlibs
        run: |
          dkp-pacman -Sy --noconfirm 3ds-dev 3ds-sdl2 3ds-sdl2_mixer 3ds-sdl2_ttf

      - name: Build
        run: make -f Makefiles/Makefile_3ds -j$(nproc)

      - name: Verify CIA/3DSX exists
        run: ls -lh *.cia *.3dsx 2>/dev/null || ls -lh *.elf

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-3ds
          path: |
            *.cia
            *.3dsx
            *.smdh
          retention-days: 14
