name: CI – Xbox (Original, nxdk)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_xbox'
      - '.github/workflows/ci_xbox_original.yml'
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    name: Build Original Xbox (nxdk)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install nxdk dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            clang lld cmake ninja-build python3 python3-pip \
            libsdl2-dev bison flex git libssl-dev

      - name: Cache nxdk
        id: cache-nxdk
        uses: actions/cache@v4
        with:
          path: ~/nxdk
          key: nxdk-master-${{ hashFiles('.github/workflows/ci_xbox_original.yml') }}

      - name: Clone & build nxdk
        if: steps.cache-nxdk.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/XboxDev/nxdk.git ~/nxdk
          cd ~/nxdk && make -j$(nproc)

      - name: Build Blockamok for OG Xbox
        run: |
          NXDK_DIR=~/nxdk make -f Makefiles/Makefile_xbox -j$(nproc)

      - name: Verify XBE/ISO exists
        run: ls -lh *.xbe *.iso 2>/dev/null || ls -lh BlockamokRemix.* || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-xbox-original
          path: |
            *.xbe
            *.iso
          retention-days: 14
