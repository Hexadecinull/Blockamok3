name: CI – PS3 (PSL1GHT)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_ps3'
      - '.github/workflows/ci_ps3.yml'
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    name: Build PS3 (PSL1GHT)
    runs-on: ubuntu-24.04
    # ps3dev/ps3dev provides a pre-built ppu-gcc + PSL1GHT environment,
    # avoiding the ~30-minute cold-build of ps3toolchain from source.
    container:
      image: ps3dev/ps3dev:latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify toolchain
        run: ppu-gcc --version

      - name: Build Blockamok for PS3
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=$PS3DEV/psl1ght
          make -f Makefiles/Makefile_ps3 -j$(nproc)

      - name: Verify output
        run: ls -lh *.self *.elf 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-ps3
          path: |
            *.self
            *.elf
          retention-days: 14
          if-no-files-found: warn
