name: CI – Compile-time Sanity Checks

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'ci/stubs/**'
      - '.github/workflows/ci_compile_check.yml'
  pull_request:
    branches: [main, master, develop]

# Uses gcc -fsyntax-only with platform stub headers so we can verify every
# #ifdef branch parses cleanly without needing cross-compilers.

jobs:
  syntax-check:
    name: Syntax check (${{ matrix.target }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: PC_LINUX
            defines: -DPC -DLINUX
          - target: ANDROID
            defines: -DANDROID -DNO_QUIT -DFORCE_DRAW_BG -DFORCE_DRAW_OVERLAY
          - target: EMSCRIPTEN
            defines: -DPC -D__EMSCRIPTEN__
          - target: SWITCH
            defines: -DSWITCH
          - target: WII_U
            defines: -DWII_U
          - target: WII
            defines: -DWII
          - target: GAMECUBE
            defines: -DGAMECUBE
          - target: XBOX
            defines: -DXBOX
          - target: XBOX360
            defines: -DXBOX360
          - target: PS3
            defines: -DPS3
          - target: VITA
            defines: -DVITA
          - target: PSP
            defines: -DPSP
          - target: THREEDS
            defines: -DTHREEDS

    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 dev headers (needed for all targets)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc libsdl2-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Check all src/*.c files parse cleanly
        run: |
          DEFINES="${{ matrix.defines }}"
          FAILED=0

          # ci/stubs/ provides empty stub headers for platform-specific includes
          # so gcc can syntax-check every #ifdef branch on any host.
          STUB_DIR="ci/stubs"
          SDL_INC=$(sdl2-config --cflags | sed 's/-D[^ ]*//g')

          for f in src/*.c src/audio/*.c src/fonts/*.c; do
            echo -n "  Checking $f ... "
            ERR=$(gcc -fsyntax-only -w \
              $DEFINES \
              -I"$STUB_DIR" \
              $SDL_INC \
              -Isrc \
              "$f" 2>&1)
            if [ $? -ne 0 ]; then
              echo "FAILED"
              echo "$ERR"
              FAILED=1
            else
              echo "ok"
            fi
          done

          if [ $FAILED -ne 0 ]; then
            echo ""
            echo "One or more files failed syntax check for target: ${{ matrix.target }}"
            exit 1
          fi
          echo "All files passed for ${{ matrix.target }}"
