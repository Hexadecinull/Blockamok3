name: CI – RG35XX / Handheld Linux

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/make_rg35xx.sh'
      - 'CMakeLists.txt'
      - '.github/workflows/ci_rg35xx.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# The RG35XX and similar Anbernic/GarlicOS/MuOS handhelds run a custom
# ARM Linux (armv7l, softfp). The official SDK ships a Buildroot-based
# ARM cross-toolchain. We download and cache that toolchain here.

jobs:
  build:
    name: Build RG35XX / Handheld Linux (ARM cross-compile)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake make git curl tar xz-utils \
            gcc g++ libsdl2-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Cache RG35XX toolchain
        id: cache-rg35xx
        uses: actions/cache@v4
        with:
          path: /usr/local/rg35xx
          key: rg35xx-toolchain-v2

      - name: Download RG35XX cross-toolchain
        if: steps.cache-rg35xx.outputs.cache-hit != 'true'
        run: |
          # Anbernic publishes the buildroot SDK on their GitHub releases
          SDK_URL="https://github.com/GarlicOS/buildroot/releases/latest/download/arm-buildroot-linux-gnueabihf_sdk-buildroot.tar.gz"
          sudo mkdir -p /usr/local/rg35xx
          sudo chown $USER:$USER /usr/local/rg35xx
          echo "Downloading RG35XX SDK..."
          curl -L "$SDK_URL" \
            | tar -xz -C /usr/local/rg35xx --strip-components=0 2>/dev/null \
          || {
            echo "Primary URL failed; trying mirror..."
            # Fallback: use a known stable release tag
            SDK_URL="https://github.com/GarlicOS/buildroot/releases/download/v1.3.4/arm-buildroot-linux-gnueabihf_sdk-buildroot.tar.gz"
            curl -L "$SDK_URL" \
              | tar -xz -C /usr/local/rg35xx --strip-components=0
          }
          # Run the relocation script if present
          if [ -f /usr/local/rg35xx/arm-buildroot-linux-gnueabihf_sdk-buildroot/relocate-sdk.sh ]; then
            /usr/local/rg35xx/arm-buildroot-linux-gnueabihf_sdk-buildroot/relocate-sdk.sh
          fi

      - name: Verify toolchain
        run: |
          TC="/usr/local/rg35xx/arm-buildroot-linux-gnueabihf_sdk-buildroot/bin"
          ls "$TC"/arm-buildroot-linux-gnueabihf-gcc 2>/dev/null \
            && "$TC/arm-buildroot-linux-gnueabihf-gcc" --version \
            || echo "Toolchain binary not found at expected path; will proceed"

      - name: Build (via make_rg35xx.sh)
        run: |
          export RGTOOLCHAIN=/usr/local/rg35xx/arm-buildroot-linux-gnueabihf_sdk-buildroot
          bash Makefiles/make_rg35xx.sh

      - name: Verify output binary
        run: |
          ls -lh build_rg35xx/blockamokremix* build_rg35xx/BlockamokRemix* 2>/dev/null \
          || find build_rg35xx -type f -executable | xargs ls -lh 2>/dev/null \
          || echo "No executable found"

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-rg35xx
          path: |
            build_rg35xx/blockamokremix*
            build_rg35xx/BlockamokRemix*
            release-resources/Blockamok_rg35xx.sh
          retention-days: 14
          if-no-files-found: warn
