name: CI – RG35XX / Handheld Linux

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/make_rg35xx.sh'
      - 'CMakeLists.txt'
      - '.github/workflows/ci_rg35xx.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# The RG35XX and compatible Anbernic handhelds run ARM Linux (armhf/gnueabihf).
# We cross-compile inside an ARM Docker container via QEMU so we don't need
# dpkg --add-architecture (which requires Ubuntu's ARM apt sources).

jobs:
  build:
    name: Build RG35XX / Handheld Linux (ARM cross-compile)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU for ARM emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build in ARM container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          platforms: linux/arm/v7
          file: ci/Dockerfile.rg35xx
          outputs: type=local,dest=build_rg35xx_out

      - name: Verify ARM binary
        run: |
          BIN=$(find build_rg35xx_out -type f -executable 2>/dev/null | head -1)
          if [ -n "$BIN" ]; then
            file "$BIN" || true
            ls -lh "$BIN"
          else
            echo "No executable found – check build output"
            find build_rg35xx_out -type f | head -20
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-rg35xx-arm
          path: |
            build_rg35xx_out/blockamokremix*
            build_rg35xx_out/BlockamokRemix*
          retention-days: 14
          if-no-files-found: warn
