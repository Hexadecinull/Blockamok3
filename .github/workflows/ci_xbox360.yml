name: CI – Xbox 360 (libxenon)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_xbox360'
      - '.github/workflows/ci_xbox360.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build Xbox 360 (libxenon)
    runs-on: ubuntu-24.04
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ make cmake git curl wget \
            bison flex texinfo libgmp-dev libmpfr-dev libmpc-dev \
            libncurses-dev python3 zlib1g-dev

      - name: Cache libxenon toolchain
        id: cache-xenon
        uses: actions/cache@v4
        with:
          path: /usr/local/xenon
          key: libxenon-toolchain-v6-${{ runner.os }}

      - name: Try downloading prebuilt xenon toolchain
        id: prebuilt
        if: steps.cache-xenon.outputs.cache-hit != 'true'
        run: |
          PREFIX=/usr/local/xenon
          sudo mkdir -p $PREFIX && sudo chown $USER:$USER $PREFIX

          # Try Free60Project prebuilt release (x86_64 Linux host)
          RELEASE_URL="https://github.com/Free60Project/libxenon/releases/download/toolchain-20231010/xenon-toolchain-linux-x86_64.tar.gz"
          echo "Attempting prebuilt toolchain download..."
          if curl -sSfL "$RELEASE_URL" | tar -xz -C $PREFIX --strip-components=1 2>/dev/null; then
            echo "prebuilt=true" >> $GITHUB_OUTPUT
            echo "✅ Prebuilt toolchain installed"
          else
            echo "prebuilt=false" >> $GITHUB_OUTPUT
            echo "Prebuilt not available, will build from source"
          fi

      - name: Build libxenon toolchain from source
        if: steps.cache-xenon.outputs.cache-hit != 'true' && steps.prebuilt.outputs.prebuilt != 'true'
        timeout-minutes: 50
        run: |
          PREFIX=/usr/local/xenon
          git clone --depth=1 https://github.com/Free60Project/libxenon.git /tmp/libxenon
          cd /tmp/libxenon
          CROSS_INSTALL_PREFIX=$PREFIX make -j$(nproc) toolchain 2>&1 | tail -100
          CROSS_INSTALL_PREFIX=$PREFIX make -j$(nproc) install  2>&1 | tail -50

      - name: Add toolchain to PATH
        run: echo "/usr/local/xenon/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: |
          powerpc64-xenon-elf-gcc --version \
            || (echo "::warning::powerpc64-xenon-elf-gcc not available"; exit 1)

      - name: Build Blockamok for Xbox 360
        run: |
          if command -v powerpc64-xenon-elf-gcc &>/dev/null; then
            make -f Makefiles/Makefile_xbox360 XENON_DIR=/usr/local/xenon -j$(nproc)
          else
            echo "::warning::powerpc64-xenon-elf-gcc not available – toolchain unavailable."
            exit 0
          fi

      - name: Verify output
        run: ls -lh *.xex 2>/dev/null || echo "No output produced"

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-xbox360
          path: '*.xex'
          retention-days: 14
          if-no-files-found: warn
