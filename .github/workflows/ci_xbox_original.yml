name: CI – Xbox (Original, nxdk)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_xbox'
      - '.github/workflows/ci_xbox_original.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build Original Xbox (nxdk)
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/xboxdev/nxdk:latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up nxdk environment
        run: |
          # Locate NXDK and ensure its toolchain is in PATH
          NXDK="${NXDK_DIR:-/usr/src/nxdk}"
          echo "NXDK_DIR=$NXDK" >> $GITHUB_ENV

          # nxdk ships activate.sh or similar; source it if present
          if [ -f "$NXDK/bin/activate" ]; then
            source "$NXDK/bin/activate"
          fi

          # Add nxdk's llvm/bin and tool wrappers to PATH
          for d in "$NXDK/bin" "$NXDK/tools/cxbe" "$NXDK/lib/llvm/bin"; do
            [ -d "$d" ] && echo "$d" >> $GITHUB_PATH
          done

          echo "NXDK path: $NXDK"
          ls "$NXDK/" 2>/dev/null | head -20

      - name: Verify toolchain
        run: |
          which nxdk-cc 2>/dev/null || \
          (find / -name "nxdk-cc" 2>/dev/null | head -3 && \
           echo "nxdk-cc not in PATH; adding its directory..." && \
           NXDK_CC=$(find / -name "nxdk-cc" 2>/dev/null | head -1) && \
           [ -n "$NXDK_CC" ] && echo "$(dirname $NXDK_CC)" >> $GITHUB_PATH)
          nxdk-cc --version 2>/dev/null || clang --version

      - name: Build Blockamok for OG Xbox
        run: |
          make -f Makefiles/Makefile_xbox NXDK_DIR="$NXDK_DIR" -j$(nproc)

      - name: Verify output
        run: ls -lh *.xbe *.iso 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-xbox-original
          path: |
            *.xbe
            *.iso
          retention-days: 14
          if-no-files-found: warn
