name: CI – Compile-time Sanity Checks

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
  pull_request:
    branches: [main, master, develop]

# Quick matrix that confirms each platform-specific #define compiles cleanly
# using the host GCC (no cross-compiler needed: we only verify parse+type-check)

jobs:
  syntax-check:
    name: Syntax / define check (${{ matrix.target }})
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: PC_LINUX
            defines: -DPC -DLINUX
          - target: ANDROID
            defines: -DANDROID -DNO_QUIT -DFORCE_DRAW_BG -DFORCE_DRAW_OVERLAY
          - target: EMSCRIPTEN_SIM
            defines: -DPC -D__EMSCRIPTEN__
          - target: SWITCH
            defines: -DSWITCH
          - target: WII_U
            defines: -DWII_U
          - target: XBOX
            defines: -DXBOX
          - target: XBOX360
            defines: -DXBOX360
          - target: PS3
            defines: -DPS3
          - target: VITA
            defines: -DVITA
          - target: PSP
            defines: -DPSP
          - target: THREEDS
            defines: -DTHREEDS

    steps:
      - uses: actions/checkout@v4

      - name: Install common dev headers
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc libsdl2-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Check all src/*.c files parse cleanly
        run: |
          DEFINES="${{ matrix.defines }}"
          FAILED=0
          for f in src/*.c src/audio/*.c src/fonts/*.c; do
            gcc -fsyntax-only -w \
              $DEFINES \
              -I/usr/include/SDL2 \
              -Isrc \
              "$f" 2>&1 | grep -v "warning:" || FAILED=1
          done
          exit $FAILED
