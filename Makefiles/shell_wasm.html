<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Blockamok Remix</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }

    #canvas-wrap { position: relative; flex-shrink: 0; }
    canvas.emscripten {
      display: block; border: none; cursor: crosshair; touch-action: none;
    }

    #status {
      color: #7cf; font-family: monospace; font-size: 14px;
      margin-top: 10px; min-height: 20px;
    }
    #progress {
      width: 300px; height: 6px; background: #333; border-radius: 3px;
      margin-top: 6px; overflow: hidden;
    }
    #progress-bar { height: 100%; background: #4ef; width: 0%; transition: width .1s; }

    /* ── Performance banner ───────────────────────────────── */
    #perf-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: #1a1a2e; border-bottom: 1px solid #4ef;
      color: #ccc; font-family: monospace; font-size: 13px;
      padding: 8px 16px; display: none;
      align-items: center; gap: 12px; justify-content: center;
    }
    #perf-banner a { color: #4ef; cursor: pointer; text-decoration: underline; }
    #perf-banner .dismiss { color: #666; cursor: pointer; }

    /* ── Virtual gamepad shared ───────────────────────────── */
    .btn {
      display: flex; align-items: center; justify-content: center;
      font-family: monospace; font-weight: bold; user-select: none;
      -webkit-tap-highlight-color: transparent; cursor: pointer;
      border-radius: 8px; border: 2px solid rgba(255,255,255,.28);
      background: rgba(255,255,255,.13); color: rgba(255,255,255,.82);
      transition: background .07s, transform .07s;
    }
    .btn:active, .btn.pressed {
      background: rgba(78,239,255,.42); transform: scale(.93);
    }

    /* D-pad */
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4px;
    }
    .dpad-btn { font-size: 18px; }
    .dpad-center {
      background: rgba(255,255,255,.05) !important;
      border-color: transparent !important;
      pointer-events: none;
    }

    /* Action cluster */
    #btn-group {
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
    }
    #btn-row-ab { display: flex; gap: 8px; }
    #btn-row-sys { display: flex; gap: 6px; margin-top: 2px; }

    .btn-a  { background: rgba(0,180,80,.35)  !important; border-color: rgba(0,220,100,.5) !important; }
    .btn-b  { background: rgba(200,30,30,.35) !important; border-color: rgba(240,60,60,.5)  !important; }
    .btn-sys { font-size: 10px !important; border-radius: 6px !important; }

    /* ── PORTRAIT layout: controls below canvas ───────────── */
    #vpad-portrait {
      display: none;
      width: 100%; padding: 10px 16px 18px;
      background: linear-gradient(to top, rgba(0,0,0,.65), transparent);
    }
    #vpad-portrait-inner {
      display: flex; justify-content: space-between; align-items: center;
      max-width: 480px; margin: 0 auto;
    }
    #vpad-portrait #dpad  { width: 156px; height: 156px; }
    #vpad-portrait .btn-a,
    #vpad-portrait .btn-b { width: 60px; height: 60px; font-size: 14px; }
    #vpad-portrait .btn-sys { width: 52px; height: 32px; }

    /* ── LANDSCAPE layout: controls overlaid on side panels ── */
    /* The outer shell is a full-viewport row. Canvas sits in the middle.
       Left and right panels fill the letterbox space. */
    #vpad-landscape {
      display: none;
      position: fixed; inset: 0; z-index: 50;
      pointer-events: none;
      align-items: center; justify-content: space-between;
    }

    #vpad-landscape #dpad-land {
      pointer-events: all;
      width: 144px; height: 144px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 4px;
      margin-left: 12px;
    }
    #vpad-landscape #dpad-land .dpad-btn { font-size: 18px; }
    #vpad-landscape #dpad-land .dpad-center {
      background: rgba(255,255,255,.05) !important;
      border-color: transparent !important;
      pointer-events: none;
    }

    #vpad-landscape #btn-group-land {
      pointer-events: all;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      margin-right: 12px;
    }
    #vpad-landscape #btn-row-ab-land  { display: flex; gap: 8px; }
    #vpad-landscape #btn-row-sys-land { display: flex; gap: 6px; }
    #vpad-landscape .btn-a,
    #vpad-landscape .btn-b { width: 56px; height: 56px; font-size: 14px; }
    #vpad-landscape .btn-sys { width: 50px; height: 30px; font-size: 10px !important; border-radius: 6px !important; }

  </style>
</head>
<body>

  <!-- Performance banner -->
  <div id="perf-banner">
    ⚠ Low performance detected.
    <a id="perf-link" href="#">Switch to Low-End mode</a>
    <span style="color:#555">|</span>
    <span class="dismiss" onclick="document.getElementById('perf-banner').style.display='none'">✕ Dismiss</span>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <canvas class="emscripten" id="canvas" tabindex="1"
            oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <div id="status">Loading…</div>
  <div id="progress"><div id="progress-bar"></div></div>

  <!-- PORTRAIT virtual pad (rendered below canvas) -->
  <div id="vpad-portrait">
    <div id="vpad-portrait-inner">
      <div id="dpad">
        <div></div>
        <div class="btn dpad-btn" data-code="ArrowUp">▲</div>
        <div></div>
        <div class="btn dpad-btn" data-code="ArrowLeft">◀</div>
        <div class="btn dpad-center"></div>
        <div class="btn dpad-btn" data-code="ArrowRight">▶</div>
        <div></div>
        <div class="btn dpad-btn" data-code="ArrowDown">▼</div>
        <div></div>
      </div>
      <div id="btn-group">
        <div id="btn-row-ab">
          <div class="btn btn-b" data-code="Escape">B</div>
          <div class="btn btn-a" data-code="ShiftLeft">A</div>
        </div>
        <div id="btn-row-sys">
          <div class="btn btn-sys" data-code="Backspace">SEL</div>
          <div class="btn btn-sys" data-code="Enter">START</div>
        </div>
      </div>
    </div>
  </div>

  <!-- LANDSCAPE virtual pad (overlaid on side panels) -->
  <div id="vpad-landscape">
    <!-- Left side: D-pad -->
    <div id="dpad-land">
      <div></div>
      <div class="btn dpad-btn" data-code="ArrowUp">▲</div>
      <div></div>
      <div class="btn dpad-btn" data-code="ArrowLeft">◀</div>
      <div class="btn dpad-center"></div>
      <div class="btn dpad-btn" data-code="ArrowRight">▶</div>
      <div></div>
      <div class="btn dpad-btn" data-code="ArrowDown">▼</div>
      <div></div>
    </div>

    <!-- Right side: action buttons -->
    <div id="btn-group-land">
      <div id="btn-row-ab-land">
        <div class="btn btn-b" data-code="Escape">B</div>
        <div class="btn btn-a" data-code="ShiftLeft">A</div>
      </div>
      <div id="btn-row-sys-land">
        <div class="btn btn-sys" data-code="Backspace">SEL</div>
        <div class="btn btn-sys" data-code="Enter">START</div>
      </div>
    </div>
  </div>

  <script>
    /* ── Build variant ──────────────────────────────────────── */
    var IS_LOW_END = window.location.pathname.indexOf('low') !== -1;

    (function() {
      var link = document.getElementById('perf-link');
      var base = window.location.pathname.replace(/\/[^/]*$/, '/');
      link.href = IS_LOW_END ? base + 'index.html' : base + 'index-low.html';
      link.textContent = IS_LOW_END ? 'Switch to Normal mode' : 'Switch to Low-End mode';
    })();

    /* ── Emscripten module ──────────────────────────────────── */
    var statusEl    = document.getElementById('status');
    var progressBar = document.getElementById('progress-bar');

    var Module = {
      canvas: document.getElementById('canvas'),
      print: function(text) {
        /* Filter out the known-harmless pre-mainloop timing warning from SDL2's eglSwapInterval */
        if (text.indexOf('emscripten_set_main_loop_timing') !== -1) return;
        console.log(text);
      },
      printErr: function(text) {
        if (text.indexOf('emscripten_set_main_loop_timing') !== -1) return;
        console.warn(text);
      },
      setStatus: function(text) {
        if (!text) { statusEl.style.display = 'none'; return; }
        statusEl.textContent = text;
        var m = text.match(/(\d+(\.\d+)?)\/(\d+)/);
        if (m) progressBar.style.width = (100 * parseInt(m[1]) / parseInt(m[3])) + '%';
      },
      onRuntimeInitialized: function() {
        statusEl.style.display = 'none';
        document.getElementById('progress').style.display = 'none';
        startFPSWatch();
      }
    };

    /* ── Mobile detection ───────────────────────────────────── */
    function isMobile() {
      return /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
          || (navigator.maxTouchPoints > 1 && window.screen.width < 1280);
    }
    var MOBILE = isMobile();

    /* ── Orientation + resize ───────────────────────────────── */
    function isLandscape() {
      return window.innerWidth > window.innerHeight;
    }

    function layout() {
      var vw = window.innerWidth;
      var vh = window.innerHeight;
      var portraitEl  = document.getElementById('vpad-portrait');
      var landscapeEl = document.getElementById('vpad-landscape');

      if (!MOBILE) {
        var sz = Math.min(vw, vh);
        Module.canvas.style.width  = sz + 'px';
        Module.canvas.style.height = sz + 'px';
        portraitEl.style.display  = 'none';
        landscapeEl.style.display = 'none';
        return;
      }

      if (isLandscape()) {
        /* Landscape: canvas is a square fitting the full viewport height.
           Side panels (D-pad / buttons) occupy the remaining horizontal space.
           We keep the canvas square and let CSS flex center it. */
        var padW = 170; /* approx width for each side panel */
        var avail = vw - padW * 2;
        var sz = Math.min(avail, vh);
        if (sz < 120) sz = vh; /* fallback if screen too narrow */
        Module.canvas.style.width  = sz + 'px';
        Module.canvas.style.height = sz + 'px';
        portraitEl.style.display  = 'none';
        landscapeEl.style.display = 'flex';
      } else {
        /* Portrait: canvas fills width, vpad below */
        var padH = 190;
        var avail = vh - padH;
        var sz = Math.min(vw, avail);
        Module.canvas.style.width  = sz + 'px';
        Module.canvas.style.height = sz + 'px';
        portraitEl.style.display  = 'block';
        landscapeEl.style.display = 'none';
      }
    }

    window.addEventListener('resize', layout);
    window.addEventListener('orientationchange', function() {
      setTimeout(layout, 120); /* wait for viewport to settle */
    });
    layout();

    /* ── Virtual gamepad input ──────────────────────────────── */
    var KEY_CODES = {
      ArrowUp: 38, ArrowDown: 40, ArrowLeft: 37, ArrowRight: 39,
      Enter: 13, ShiftLeft: 16, Escape: 27, Backspace: 8
    };

    function fireKey(type, code) {
      var kc = KEY_CODES[code] || 0;
      Module.canvas.dispatchEvent(new KeyboardEvent(type, {
        key: code, code: code, bubbles: true, cancelable: true,
        keyCode: kc, which: kc
      }));
    }

    var touchMap = {}; /* identifier → element */

    function pressEl(el) {
      if (!el || !el.dataset.code) return;
      el.classList.add('pressed');
      fireKey('keydown', el.dataset.code);
    }
    function releaseEl(el) {
      if (!el || !el.dataset.code) return;
      el.classList.remove('pressed');
      fireKey('keyup', el.dataset.code);
    }

    function onTouchStart(e) {
      e.preventDefault();
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        var el = document.elementFromPoint(t.clientX, t.clientY);
        touchMap[t.identifier] = el;
        pressEl(el);
      }
    }
    function onTouchEnd(e) {
      e.preventDefault();
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        releaseEl(touchMap[t.identifier]);
        delete touchMap[t.identifier];
      }
    }
    function onTouchMove(e) {
      e.preventDefault();
      for (var i = 0; i < e.changedTouches.length; i++) {
        var t = e.changedTouches[i];
        var newEl = document.elementFromPoint(t.clientX, t.clientY);
        var oldEl = touchMap[t.identifier];
        if (newEl !== oldEl) {
          releaseEl(oldEl);
          pressEl(newEl);
          touchMap[t.identifier] = newEl;
        }
      }
    }

    if (MOBILE) {
      var opts = { passive: false };
      ['vpad-portrait', 'vpad-landscape'].forEach(function(id) {
        var el = document.getElementById(id);
        el.addEventListener('touchstart',  onTouchStart, opts);
        el.addEventListener('touchend',    onTouchEnd,   opts);
        el.addEventListener('touchcancel', onTouchEnd,   opts);
        el.addEventListener('touchmove',   onTouchMove,  opts);
      });
    }

    /* ── FPS watchdog ───────────────────────────────────────── */
    function startFPSWatch() {
      if (IS_LOW_END) return;
      var frames = 0, t0 = performance.now();
      function tick() {
        frames++;
        if (performance.now() - t0 > 5000) {
          if (frames / 5 < 30)
            document.getElementById('perf-banner').style.display = 'flex';
          return;
        }
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    /* Audio unlock: resume SDL2's AudioContext on first user gesture.
       Browsers suspend AudioContext until the user interacts — this fires
       on first keydown/mousedown/touchstart and is then removed. */
    (function() {
      function unlockAudio() {
        try {
          var ctx = Module.SDL2 && Module.SDL2.audioContext;
          if (ctx && ctx.state !== 'running') ctx.resume().catch(function(){});
        } catch(e) {}
      }
      var _o = { once: true, capture: true, passive: true };
      document.addEventListener('keydown',    unlockAudio, _o);
      document.addEventListener('mousedown',  unlockAudio, _o);
      document.addEventListener('touchstart', unlockAudio, _o);
    })();
  </script>

  {{{ SCRIPT }}}
</body>
</html>
