name: CI – Android

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'android/**'
      - 'Makefiles/Android.mk'
      - 'Makefiles/Application.mk'
      - '.github/workflows/ci_android.yml'
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    name: Build Android APK (API 19 → 36)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r26
        run: |
          echo "y" | sdkmanager --install "ndk;26.3.11579264" "build-tools;34.0.0" "platforms;android-36"

      - name: Cache SDL2 for Android
        id: cache-sdl2-android
        uses: actions/cache@v4
        with:
          path: android/app/src/main/jni/SDL2
          key: sdl2-android-2.30.10

      - name: Download & unpack SDL2 Android sources
        if: steps.cache-sdl2-android.outputs.cache-hit != 'true'
        run: |
          SDL_VER="2.30.10"
          MIX_VER="2.8.0"
          TTF_VER="2.22.0"
          curl -sL "https://github.com/libsdl-org/SDL/releases/download/release-$SDL_VER/SDL2-$SDL_VER.tar.gz" | tar -xz -C android/app/src/main/jni/
          curl -sL "https://github.com/libsdl-org/SDL_mixer/releases/download/release-$MIX_VER/SDL2_mixer-$MIX_VER.tar.gz" | tar -xz -C android/app/src/main/jni/
          curl -sL "https://github.com/libsdl-org/SDL_ttf/releases/download/release-$TTF_VER/SDL2_ttf-$TTF_VER.tar.gz" | tar -xz -C android/app/src/main/jni/
          mv android/app/src/main/jni/SDL2-$SDL_VER     android/app/src/main/jni/SDL2
          mv android/app/src/main/jni/SDL2_mixer-$MIX_VER android/app/src/main/jni/SDL2_mixer
          mv android/app/src/main/jni/SDL2_ttf-$TTF_VER  android/app/src/main/jni/SDL2_ttf

      - name: Symlink C sources into jni tree
        run: |
          ln -sf $(pwd)/src/*.c   android/app/src/main/c/ 2>/dev/null || true
          ln -sf $(pwd)/src/audio/*.c  android/app/src/main/c/audio/ 2>/dev/null || true
          ln -sf $(pwd)/src/fonts/*.c  android/app/src/main/c/fonts/ 2>/dev/null || true
          # Also copy headers so NDK can find them
          cp -n src/*.h android/app/src/main/c/ 2>/dev/null || true
          cp -n src/audio/*.h android/app/src/main/c/audio/ 2>/dev/null || true
          cp -n src/fonts/*.h android/app/src/main/c/fonts/ 2>/dev/null || true

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew 2>/dev/null || true
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Verify APK exists
        run: |
          find android -name "*.apk" | xargs ls -lh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  lint:
    name: Lint Android Manifest
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Check screenOrientation is landscape
        run: |
          grep -q 'screenOrientation="landscape"' android/app/src/main/AndroidManifest.xml \
            && echo "✅ Landscape orientation confirmed" \
            || (echo "❌ Missing landscape orientation in AndroidManifest.xml" && exit 1)

      - name: Check targetSdk is 36
        run: |
          grep -q 'targetSdk 36' android/app/build.gradle \
            && echo "✅ targetSdk 36 confirmed" \
            || (echo "❌ targetSdk is not 36" && exit 1)

      - name: Check minSdk is 19
        run: |
          grep -q 'minSdk 19' android/app/build.gradle \
            && echo "✅ minSdk 19 confirmed" \
            || (echo "❌ minSdk is not 19" && exit 1)
