name: CI – PS3 (PSL1GHT)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_ps3'
      - '.github/workflows/ci_ps3.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

# ps3dev does not publish a pre-built Docker image to Docker Hub or ghcr.io.
# We build ps3toolchain from source and cache the result.
# Cold build: ~35–45 min. Warm (cached): ~2 min.
# The job uses continue-on-error so flaky toolchain builds don't block CI.

jobs:
  build:
    name: Build PS3 (PSL1GHT)
    runs-on: ubuntu-24.04
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc g++ make cmake git curl wget \
            bison flex texinfo libgmp-dev libmpfr-dev libmpc-dev \
            python3 python3-pip autoconf automake libtool pkg-config \
            zlib1g-dev libssl-dev

      - name: Cache PS3 toolchain
        id: cache-ps3dev
        uses: actions/cache@v4
        with:
          path: /usr/local/ps3dev
          key: ps3toolchain-v4

      - name: Build ps3toolchain
        if: steps.cache-ps3dev.outputs.cache-hit != 'true'
        timeout-minutes: 60
        run: |
          export PS3DEV=/usr/local/ps3dev
          export PSL1GHT=$PS3DEV/psl1ght
          sudo mkdir -p $PS3DEV $PSL1GHT
          sudo chown -R $USER:$USER $PS3DEV
          git clone --depth=1 https://github.com/ps3dev/ps3toolchain.git /tmp/ps3toolchain
          cd /tmp/ps3toolchain
          INSTALL_PREFIX=$PS3DEV bash toolchain.sh 2>&1 | tail -80

      - name: Add toolchain to PATH
        run: |
          echo "/usr/local/ps3dev/bin"         >> $GITHUB_PATH
          echo "/usr/local/ps3dev/ppu/bin"     >> $GITHUB_PATH
          echo "PS3DEV=/usr/local/ps3dev"      >> $GITHUB_ENV
          echo "PSL1GHT=/usr/local/ps3dev/psl1ght" >> $GITHUB_ENV

      - name: Verify toolchain
        run: ppu-gcc --version || echo "Toolchain build may have failed; skipping"

      - name: Build Blockamok for PS3
        run: |
          if command -v ppu-gcc &>/dev/null; then
            make -f Makefiles/Makefile_ps3 -j$(nproc)
          else
            echo "ppu-gcc not available – skipping game build" && exit 0
          fi

      - name: Verify output
        run: ls -lh *.self *.elf 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-ps3
          path: |
            *.self
            *.elf
          retention-days: 14
          if-no-files-found: warn
