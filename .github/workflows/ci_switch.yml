name: CI – Nintendo Switch

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/**'
      - 'Makefiles/Makefile_switch'
      - '.github/workflows/ci_switch.yml'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build Nintendo Switch (devkitPro)
    runs-on: ubuntu-24.04
    container:
      image: devkitpro/devkita64:latest

    steps:
      - uses: actions/checkout@v4

      - name: Sync dkp-pacman databases with retry
        # pkg.devkitpro.org CDN occasionally returns 403; retry a few times before giving up.
        continue-on-error: true
        run: |
          dkp-pacman -Sy --noconfirm 2>/dev/null ||           (sleep 20 && dkp-pacman -Sy --noconfirm 2>/dev/null) ||           (sleep 40 && dkp-pacman -Sy --noconfirm 2>/dev/null) ||           (sleep 60 && dkp-pacman -Sy --noconfirm)

      - name: Install switch-portlibs
        run: |
          dkp-pacman -S --noconfirm --needed             switch-portlibs switch-sdl2 switch-sdl2_mixer switch-sdl2_ttf ||             echo "Warning: switch SDL2 portlibs unavailable – CDN may be down"

      - name: Build
        run: make -f Makefiles/Makefile_switch -j$(nproc)

      - name: Verify output
        run: ls -lh *.nro 2>/dev/null || ls -lh *.elf

      - uses: actions/upload-artifact@v4
        with:
          name: blockamokremix-switch
          path: |
            *.nro
            *.nacp
          retention-days: 14
          if-no-files-found: warn
