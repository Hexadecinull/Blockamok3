name: CI – CodeQL Static Analysis

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    name: CodeQL (C)
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc make libsdl2-dev libsdl2-mixer-dev libsdl2-ttf-dev libmikmod-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c
          queries: security-and-quality

      - name: Build for analysis
        run: make -f Makefiles/Makefile_linux -j$(nproc)

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:c"
        # Advanced Security must be enabled (free on public repos;
        # requires GHAS licence on private repos).
        continue-on-error: true
